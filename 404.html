<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<script>
/* One ID / OAuth redirect-catcher — must stay at the top of index.html and 404.html */
(function () {
  var h = location.hash || "";
  var q = location.search || "";
  if (/access_token|refresh_token|error_description|type=recovery/.test(h) || /[?&]code=/.test(q)) {
    location.replace("/onesocial-v2-preview/" + q + h);
    return;
  }
  // Unknown path -> home (the hub)
  location.replace("/");
})();
</script>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>One World Labs</title>
<style>body{margin:0;background:#FAFAF8;font-family:Inter,system-ui,sans-serif;display:flex;align-items:center;justify-content:center;height:100vh;color:#6b7280;font-size:14px}</style>
</head>
<body>Taking you home…</body>
</html>
